<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Surface Plot — WECORE Hero</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; overflow: hidden; font-family: 'Geist', 'Inter', system-ui, sans-serif; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="surface"></canvas>

  <script type="importmap">
    { "imports": { "three": "/vendor/js/three@0.169.0.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Surface function: sum of Gaussian peaks + subtle ridges ──────────
    // Represents compute clusters (peaks) on an interconnect fabric (grid)
    function surfaceHeight(x, z) {
      const sx = x * 0.75;
      const sz = z * 0.75;
      let h = 0;

      // Central dominant peak — the primary cluster
      h += 1.5 * Math.exp(-(sx * sx + sz * sz) / 4.0);

      // Secondary peaks arranged around center
      h += 0.85 * Math.exp(-((sx - 2.8) * (sx - 2.8) + (sz - 1.5) * (sz - 1.5)) / 3.0);
      h += 0.90 * Math.exp(-((sx + 2.2) * (sx + 2.2) + (sz - 2.0) * (sz - 2.0)) / 3.5);
      h += 0.78 * Math.exp(-((sx + 1.0) * (sx + 1.0) + (sz + 2.8) * (sz + 2.8)) / 3.2);
      h += 0.70 * Math.exp(-((sx - 2.2) * (sx - 2.2) + (sz + 2.5) * (sz + 2.5)) / 3.8);

      // Ridge connecting two clusters (elongated Gaussian)
      const rx = (sx - 0.3) * 0.6 + (sz - 0.5) * 0.8;
      const rz = (sx - 0.3) * -0.8 + (sz - 0.5) * 0.6;
      h += 0.55 * Math.exp(-(rx * rx) / 7.0 - (rz * rz) / 1.4);

      // Subtle surface texture — like computational "traffic" or data flow
      h += 0.10 * Math.sin(sx * 2.2) * Math.cos(sz * 2.2);
      h += 0.07 * Math.cos(sx * 3.5 + sz * 2.8);

      return h;
    }

    // ── Build clean grid-line surface (no triangle diagonals) ────────────
    function createSurfaceGrid(size, segments, lineColor) {
      const group = new THREE.Group();
      const material = new THREE.LineBasicMaterial({
        color: lineColor,
        linewidth: 1, // WebGL clamps to 1px — on retina ≈ 0.5 CSS px
      });

      const half = size / 2;
      const step = size / segments;

      // Horizontal grid lines (constant Z)
      for (let row = 0; row <= segments; row++) {
        const z = -half + row * step;
        const pts = [];
        for (let col = 0; col <= segments; col++) {
          const x = -half + col * step;
          pts.push(new THREE.Vector3(x, surfaceHeight(x, z), z));
        }
        const geom = new THREE.BufferGeometry().setFromPoints(pts);
        group.add(new THREE.Line(geom, material));
      }

      // Vertical grid lines (constant X)
      for (let col = 0; col <= segments; col++) {
        const x = -half + col * step;
        const pts = [];
        for (let row = 0; row <= segments; row++) {
          const z = -half + row * step;
          pts.push(new THREE.Vector3(x, surfaceHeight(x, z), z));
        }
        const geom = new THREE.BufferGeometry().setFromPoints(pts);
        group.add(new THREE.Line(geom, material));
      }

      return group;
    }

    // ── Build subtle dot nodes at grid intersections ─────────────────────
    function createGridDots(size, segments, dotColor) {
      const half = size / 2;
      const step = size / segments;
      const positions = [];

      for (let row = 0; row <= segments; row++) {
        const z = -half + row * step;
        for (let col = 0; col <= segments; col++) {
          const x = -half + col * step;
          positions.push(x, surfaceHeight(x, z), z);
        }
      }

      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

      // Tiny circular dot sprite
      const canvas = document.createElement('canvas');
      canvas.width = 8;
      canvas.height = 8;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = dotColor;
      ctx.beginPath();
      ctx.arc(4, 4, 1.2, 0, Math.PI * 2);
      ctx.fill();

      const texture = new THREE.CanvasTexture(canvas);
      const spriteMaterial = new THREE.PointsMaterial({
        map: texture,
        color: dotColor,
        size: 0.08,
        sizeAttenuation: true,
        depthTest: true,
        transparent: true,
        opacity: 0.55,
      });

      return new THREE.Points(geom, spriteMaterial);
    }

    // ── Initialize ───────────────────────────────────────────────────────
    function init(canvas) {
      const cssW = canvas.clientWidth || window.innerWidth;
      const cssH = canvas.clientHeight || window.innerHeight;
      const aspect = cssW / Math.max(cssH, 1);

      // Scene
      const scene = new THREE.Scene();
      scene.background = new THREE.Color('#ffffff');

      // Orthographic camera — isometric axonometric projection
      const frustumSize = 12;
      const camera = new THREE.OrthographicCamera(
        (frustumSize * aspect) / -2, (frustumSize * aspect) / 2,
        frustumSize / 2, frustumSize / -2,
        0.1, 100
      );

      // Camera position: azimuth 45°, elevation ~38° (looking down ~52°)
      const azimuth = Math.PI / 4;
      const elevation = Math.PI / 4.8; // ~37.5°
      const dist = 15;
      camera.position.set(
        dist * Math.cos(elevation) * Math.cos(azimuth),
        dist * Math.sin(elevation),
        dist * Math.cos(elevation) * Math.sin(azimuth)
      );
      camera.lookAt(0, 0.6, 0); // Look slightly above center for better framing
      camera.updateProjectionMatrix();

      // Brand colors
      const accentColor = '#000d14'; // --color--accent from site CSS
      const dotColor = '#333333';    // body text color, softer than full black

      // Build surface
      const size = 10;
      const segments = 80; // 80×80 grid — crisp but not noisy
      const surface = createSurfaceGrid(size, segments, accentColor);
      scene.add(surface);

      // Optional: subtle dots at intersections
      const dots = createGridDots(size, segments, dotColor);
      scene.add(dots);

      // Renderer
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: false,
        preserveDrawingBuffer: false,
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(cssW, cssH, false);
      renderer.render(scene, camera);

      return { renderer, scene, camera, surface, dots };
    }

    // ── Bootstrap ────────────────────────────────────────────────────────
    const canvas = document.getElementById('surface');
    if (!canvas) throw new Error('Canvas #surface not found');

    const app = init(canvas);

    // Resize
    let timeout;
    window.addEventListener('resize', () => {
      clearTimeout(timeout);
      timeout = setTimeout(() => {
        const w = canvas.clientWidth || window.innerWidth;
        const h = canvas.clientHeight || window.innerHeight;
        if (w === 0 || h === 0) return;
        const a = w / Math.max(h, 1);
        const fs = 12;
        app.camera.left = (fs * a) / -2;
        app.camera.right = (fs * a) / 2;
        app.camera.top = fs / 2;
        app.camera.bottom = fs / -2;
        app.camera.updateProjectionMatrix();
        app.renderer.setSize(w, h, false);
        app.renderer.render(app.scene, app.camera);
      }, 150);
    });
  </script>
</body>
</html>
